version: "3.9"
services:
  api:
    image: python:3.12-slim
    ports:
      - "8000:8000"
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
