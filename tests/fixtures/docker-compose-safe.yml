version: "3.9"
services:
  api:
    image: python:3.12-slim
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
