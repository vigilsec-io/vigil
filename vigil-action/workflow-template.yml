name: Vigil Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  vigil:
    name: Vigil Security
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for SARIF upload to GitHub Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Vigil
        run: pip install vigilsec --quiet

      - name: Scan with Vigil
        id: vigil
        run: |
          vigil scan . --no-color
        # Remove `continue-on-error` to block PRs on CRITICAL/HIGH findings
        continue-on-error: true

      - name: Generate SARIF report
        if: always()
        run: vigil scan . --format sarif > vigil-results.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: vigil-results.sarif
          category: vigil
