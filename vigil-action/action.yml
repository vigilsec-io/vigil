name: 'Vigil Security'
description: 'AI coding security co-pilot — scans for insecure code patterns at CI time'
author: 'vigilsec'

branding:
  icon: 'shield'
  color: 'red'

inputs:
  path:
    description: 'Path to scan (file or directory)'
    required: false
    default: '.'
  severity:
    description: 'Minimum severity to report (CRITICAL, HIGH, MEDIUM, LOW, INFO)'
    required: false
    default: 'HIGH'
  sarif-output:
    description: 'SARIF output file path (upload to GitHub Code Scanning)'
    required: false
    default: 'vigil-results.sarif'
  fail-on-findings:
    description: 'Exit with code 2 if CRITICAL/HIGH findings are present'
    required: false
    default: 'true'

outputs:
  findings-count:
    description: 'Total number of findings at or above the severity threshold'
    value: ${{ steps.scan.outputs.findings-count }}
  sarif-file:
    description: 'Path to the generated SARIF file'
    value: ${{ inputs.sarif-output }}

runs:
  using: 'composite'
  steps:
    - name: Install vigilsec
      shell: bash
      run: pip install vigilsec --quiet

    - name: Run Vigil scan (terminal output)
      id: scan
      shell: bash
      run: |
        set +e

        # Human-readable output for CI logs
        vigil scan "${{ inputs.path }}" \
          --severity "${{ inputs.severity }}" \
          --no-color
        TERMINAL_EXIT=$?

        # SARIF output for GitHub Code Scanning
        vigil scan "${{ inputs.path }}" \
          --severity "${{ inputs.severity }}" \
          --format sarif > "${{ inputs.sarif-output }}" 2>/dev/null

        # Finding count for the output variable
        COUNT=$(vigil scan "${{ inputs.path }}" \
          --severity "${{ inputs.severity }}" \
          --format json 2>/dev/null \
          | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null \
          || echo "0")
        echo "findings-count=$COUNT" >> "$GITHUB_OUTPUT"

        if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ "$TERMINAL_EXIT" -eq 2 ]; then
          echo "::error::Vigil found CRITICAL/HIGH security findings. See the Security tab for details."
          exit 2
        fi
        exit 0
